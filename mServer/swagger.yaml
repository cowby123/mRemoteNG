openapi: 3.0.0
info:
  title: mRemoteNG Server API
  description: mRemoteNG 設定檔伺服器 API 文件
  version: 1.0.0
  contact:
    name: mRemoteNG Team

servers:
  - url: /
    description: 當前伺服器（自動使用當前網址和埠號）
  - url: http://localhost:7000
    description: 預設開發伺服器 (port 7000)
  - url: http://localhost:48700
    description: 其他常用埠號 (port 48700)

tags:
  - name: 認證
    description: 用戶認證相關 API
  - name: 用戶設定
    description: 用戶個人設定相關 API
  - name: 連線設定
    description: 連線設定相關 API

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT 認證 Token

  schemas:
    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          description: 用戶名
          example: john_doe
        email:
          type: string
          format: email
          description: Email 地址
          example: john@example.com
        password:
          type: string
          minLength: 6
          description: 密碼
          example: password123

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: 用戶名
          example: john_doe
        password:
          type: string
          description: 密碼
          example: password123

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          description: 用戶 ID
          example: 1
        username:
          type: string
          description: 用戶名
          example: john_doe
        email:
          type: string
          description: Email 地址
          example: john@example.com

    AuthData:
      type: object
      properties:
        token:
          type: string
          description: JWT Token
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: '#/components/schemas/UserResponse'

    JSendSuccess:
      type: object
      properties:
        status:
          type: string
          enum: [success]
          description: 狀態碼
          example: success
        data:
          type: object
          description: 成功時的資料

    JSendFail:
      type: object
      properties:
        status:
          type: string
          enum: [fail]
          description: 狀態碼
          example: fail
        message:
          type: string
          description: 失敗訊息
          example: 用戶名或密碼錯誤

    JSendError:
      type: object
      properties:
        status:
          type: string
          enum: [error]
          description: 狀態碼
          example: error
        message:
          type: string
          description: 錯誤訊息
          example: 伺服器內部錯誤
        code:
          type: integer
          description: 錯誤碼
          example: 5001

    AuthSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/JSendSuccess'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthData'

    LogoutSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/JSendSuccess'
        - type: object
          properties:
            data:
              type: object
              properties:
                message:
                  type: string
                  example: 登出成功

    SaveConfigRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: string
          description: 設定資料（任意格式字串）
          example: '{"theme":"dark","language":"zh-TW"}'

    ConfigDataResponse:
      type: object
      properties:
        data:
          type: string
          description: 設定資料
          example: '{"theme":"dark","language":"zh-TW"}'

    SaveConfigSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/JSendSuccess'
        - type: object
          properties:
            data:
              type: object
              properties:
                message:
                  type: string
                  example: 用戶設定儲存成功
                id:
                  type: integer
                  example: 1

    GetConfigSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/JSendSuccess'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ConfigDataResponse'

paths:
  /api/register:
    post:
      tags:
        - 認證
      summary: 註冊新用戶
      description: 建立新的用戶帳號
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 註冊成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          description: 請求參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '409':
          description: 用戶名或 Email 已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '500':
          description: 伺服器內部錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendError'

  /api/login:
    post:
      tags:
        - 認證
      summary: 用戶登入
      description: 使用用戶名和密碼登入
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登入成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          description: 請求參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '401':
          description: 用戶名或密碼錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '500':
          description: 伺服器內部錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendError'

  /api/logout:
    post:
      tags:
        - 認證
      summary: 用戶登出
      description: 登出並將 Token 加入黑名單
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccessResponse'
        '401':
          description: 未授權或 Token 無效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '500':
          description: 伺服器內部錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendError'

  /api/user/userconf:
    post:
      tags:
        - 用戶設定
      summary: 儲存用戶設定
      description: 儲存用戶的個人設定，後續儲存會覆蓋先前的設定
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveConfigRequest'
      responses:
        '200':
          description: 儲存成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveConfigSuccessResponse'
        '400':
          description: 請求參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '401':
          description: 未授權或 Token 無效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '500':
          description: 伺服器內部錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendError'

    get:
      tags:
        - 用戶設定
      summary: 取得用戶設定
      description: 取得用戶的個人設定
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetConfigSuccessResponse'
        '401':
          description: 未授權或 Token 無效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '404':
          description: 設定不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '500':
          description: 伺服器內部錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendError'

  /api/user/conconf:
    post:
      tags:
        - 連線設定
      summary: 儲存連線設定
      description: 儲存用戶的連線設定，後續儲存會覆蓋先前的設定
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveConfigRequest'
      responses:
        '200':
          description: 儲存成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveConfigSuccessResponse'
        '400':
          description: 請求參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '401':
          description: 未授權或 Token 無效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '500':
          description: 伺服器內部錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendError'

    get:
      tags:
        - 連線設定
      summary: 取得連線設定
      description: 取得用戶的連線設定
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetConfigSuccessResponse'
        '401':
          description: 未授權或 Token 無效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '404':
          description: 設定不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '500':
          description: 伺服器內部錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendError'
